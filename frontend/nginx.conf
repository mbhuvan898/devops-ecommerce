server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Common proxy headers — inherited by every location block below
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # =================================================================
    # API GATEWAY
    # The frontend container doubles as the gateway: each API path is
    # routed to the microservice that owns it. nginx picks the LONGEST
    # matching prefix, so /api/v1/admin/product beats /api/v1/.
    # Service names resolve via Docker network / Kubernetes DNS.
    # =================================================================

    # ---- product-service ----
    location /api/v1/product {          # /product/:id and /products...
        proxy_pass http://product-service:4002;
    }
    location /api/v1/review {           # /review and /reviews
        proxy_pass http://product-service:4002;
    }
    location /api/v1/admin/product {
        proxy_pass http://product-service:4002;
    }
    location /api/v1/admin/review {
        proxy_pass http://product-service:4002;
    }

    # ---- order-service ----
    location /api/v1/order {            # /order/... and /orders/...
        proxy_pass http://order-service:4003;
    }
    location /api/v1/admin/order {
        proxy_pass http://order-service:4003;
    }

    # ---- payment-service ----
    location /api/v1/payment {
        proxy_pass http://payment-service:4004;
    }
    location /api/v1/razorpaykey {
        proxy_pass http://payment-service:4004;
    }

    # ---- user-service (default for everything else under /api/v1) ----
    # /register /login /logout /password/* /me /admin/users /admin/user/:id
    location /api/v1/ {
        proxy_pass http://user-service:4001;
    }

    # ---------------------------------
    # Runtime env config
    # ---------------------------------
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri =404;
    }

    # ---------------------------------
    # React SPA routing
    # ---------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
