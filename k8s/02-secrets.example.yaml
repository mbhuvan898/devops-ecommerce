# =====================================================================
# EXAMPLE ONLY — copy to 02-secrets.yaml, fill in real values, and add
# 02-secrets.yaml to .gitignore. NEVER commit real secrets.
#
# stringData lets you write plain text; Kubernetes base64-encodes it.
#
# The four MONGO_URI_* values come from `terraform output`:
# each service gets its own DATABASE on the Cosmos DB account.
# Cosmos requires ?retrywrites=false in the connection string.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  JWT_SECRET: "change-me-to-a-long-random-string"

  MONGO_URI_USERS: "mongodb://ACCOUNT:KEY@ACCOUNT.mongo.cosmos.azure.com:10255/users?ssl=true&retrywrites=false&maxIdleTimeMS=120000"
  MONGO_URI_PRODUCTS: "mongodb://ACCOUNT:KEY@ACCOUNT.mongo.cosmos.azure.com:10255/products?ssl=true&retrywrites=false&maxIdleTimeMS=120000"
  MONGO_URI_ORDERS: "mongodb://ACCOUNT:KEY@ACCOUNT.mongo.cosmos.azure.com:10255/orders?ssl=true&retrywrites=false&maxIdleTimeMS=120000"
  MONGO_URI_PAYMENTS: "mongodb://ACCOUNT:KEY@ACCOUNT.mongo.cosmos.azure.com:10255/payments?ssl=true&retrywrites=false&maxIdleTimeMS=120000"

  SENDGRID_API_KEY: ""
  SENDGRID_MAIL: ""
  SENDGRID_RESET_TEMPLATEID: ""
  SENDGRID_ORDER_TEMPLATEID: ""

  RAZORPAY_KEY_ID: ""
  RAZORPAY_SECRET: ""

  AWS_S3_BUCKET: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
