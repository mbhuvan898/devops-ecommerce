# =====================================================================
# EXAMPLE ONLY — copy to 02-secrets.yaml, fill in real values, and add
# 02-secrets.yaml to .gitignore. NEVER commit real secrets.
#
# stringData lets you write plain text; Kubernetes base64-encodes it.
#
# The four MONGO_URI_* values come from `terraform output docdb_endpoint`:
# each service gets its own DATABASE on the same DocumentDB cluster.
# TLS is disabled on the cluster (see terraform/docdb.tf) so no ssl=true
# or CA bundle is needed here — same connection-string shape as local dev.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  JWT_SECRET: "change-me-to-a-long-random-string"

  MONGO_URI_USERS: "mongodb://ADMIN:PASSWORD@DOCDB_ENDPOINT:27017/users?retryWrites=false"
  MONGO_URI_PRODUCTS: "mongodb://ADMIN:PASSWORD@DOCDB_ENDPOINT:27017/products?retryWrites=false"
  MONGO_URI_ORDERS: "mongodb://ADMIN:PASSWORD@DOCDB_ENDPOINT:27017/orders?retryWrites=false"
  MONGO_URI_PAYMENTS: "mongodb://ADMIN:PASSWORD@DOCDB_ENDPOINT:27017/payments?retryWrites=false"

  SENDGRID_API_KEY: ""
  SENDGRID_MAIL: ""
  SENDGRID_RESET_TEMPLATEID: ""
  SENDGRID_ORDER_TEMPLATEID: ""

  RAZORPAY_KEY_ID: ""
  RAZORPAY_SECRET: ""

  AWS_S3_BUCKET: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
