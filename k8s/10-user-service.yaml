# Deployment = "keep N identical pods of this image running".
# Service    = stable in-cluster DNS name + load balancing across pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          # Replace REGISTRY with your ACR login server (terraform output acr_login_server)
          image: REGISTRY.azurecr.io/user-service:v1
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: MONGO_URI_USERS }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: JWT_SECRET }
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: SENDGRID_API_KEY }
            - name: SENDGRID_MAIL
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: SENDGRID_MAIL }
            - name: SENDGRID_RESET_TEMPLATEID
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: SENDGRID_RESET_TEMPLATEID }
            - name: SENDGRID_ORDER_TEMPLATEID
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: SENDGRID_ORDER_TEMPLATEID }
          envFrom:
            - configMapRef:
                name: ecommerce-config
          # Probes hit the /health endpoint each service exposes:
          # readiness = "may I receive traffic?", liveness = "restart me if dead"
          readinessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce
spec:
  selector:
    app: user-service
  ports:
    - port: 4001
      targetPort: 4001
