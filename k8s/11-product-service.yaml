apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: REGISTRY.azurecr.io/product-service:v1
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: MONGO_URI_PRODUCTS }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: JWT_SECRET }
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: AWS_S3_BUCKET }
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: AWS_ACCESS_KEY_ID }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: ecommerce-secrets, key: AWS_SECRET_ACCESS_KEY }
          envFrom:
            - configMapRef:
                name: ecommerce-config
          readinessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: ecommerce
spec:
  selector:
    app: product-service
  ports:
    - port: 4002
      targetPort: 4002
